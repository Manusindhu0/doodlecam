<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoodleCam</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/themes.css">
  <link rel="stylesheet" href="styles/holographic.css">
  <link rel="stylesheet" href="styles/animations.css">
</head>
<body data-theme="dark-neon">

  <!-- ═══ Loading Screen ═══ -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-content">
      <div class="loading-icon">
        <svg viewBox="0 0 100 100" width="80" height="80">
          <circle cx="50" cy="50" r="40" fill="none" stroke="url(#neonGrad)" stroke-width="3" stroke-dasharray="200" class="loading-ring"/>
          <defs>
            <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#00f5d4"/>
              <stop offset="50%" style="stop-color:#7b2ff7"/>
              <stop offset="100%" style="stop-color:#f72585"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="loading-title">DoodleCam</h1>
      <p class="loading-status" id="loading-status">Initializing camera...</p>
      <div class="loading-bar">
        <div class="loading-bar-fill" id="loading-bar-fill"></div>
      </div>
    </div>
  </div>

  <!-- ═══ Main App ═══ -->
  <div id="app" class="app hidden">

    <!-- Drag region for custom titlebar -->
    <div class="titlebar-drag-region"></div>

    <!-- ─── Camera & Canvas Stack ─── -->
    <div id="canvas-container" class="canvas-container">
      <!-- Hidden video for webcam stream -->
      <video id="webcam-video" autoplay playsinline muted></video>

      <!-- Scene canvas: video + doodles + face filters -->
      <canvas id="scene-canvas" class="canvas-layer"></canvas>

      <!-- Feedback canvas: fingertip dots + gesture indicators -->
      <canvas id="feedback-canvas" class="canvas-layer"></canvas>
    </div>

    <!-- ─── Holographic Toolbar ─── -->
    <div id="holo-toolbar" class="holo-toolbar">
      <div class="holo-toolbar-inner">

        <!-- Drawing Tools Group -->
        <div class="tool-group">
          <button class="tool-btn active" data-tool="pen" data-tooltip="Draw">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
            </svg>
          </button>
          <button class="tool-btn" data-tool="shapes" data-tooltip="Shapes">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
            </svg>
          </button>
          <button class="tool-btn" data-tool="text" data-tooltip="Text">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="4 7 4 4 20 4 20 7"/>
              <line x1="9.5" y1="20" x2="14.5" y2="20"/>
              <line x1="12" y1="4" x2="12" y2="20"/>
            </svg>
          </button>
          <button class="tool-btn" data-tool="stickers" data-tooltip="Stickers">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
              <line x1="9" y1="9" x2="9.01" y2="9"/>
              <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
          </button>
        </div>

        <div class="tool-separator"></div>

        <!-- Filter Tools -->
        <div class="tool-group">
          <button class="tool-btn" data-tool="cam-filter" data-tooltip="Camera Filters">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
          </button>
          <button class="tool-btn" data-tool="face-filter" data-tooltip="Face Filters">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Z"/>
              <path d="M8 9h.01M16 9h.01M9.5 15a3.5 3.5 0 0 0 5 0"/>
            </svg>
          </button>
        </div>

        <div class="tool-separator"></div>

        <!-- Color & Size -->
        <div class="tool-group">
          <button class="tool-btn color-btn" data-tool="color" data-tooltip="Color">
            <div class="color-preview" id="color-preview" style="background: #00f5d4;"></div>
          </button>
          <button class="tool-btn" data-tool="size" data-tooltip="Brush Size">
            <div class="size-preview" id="size-preview">
              <div class="size-dot"></div>
            </div>
          </button>
          <button class="tool-btn" data-tool="eraser" data-tooltip="Eraser">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/>
              <line x1="22" y1="21" x2="7" y2="21"/>
            </svg>
          </button>
          <button class="tool-btn danger-btn" data-tool="clear" data-tooltip="Clear All">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
          </button>
        </div>

        <div class="tool-separator"></div>

        <!-- Capture -->
        <div class="tool-group">
          <button class="tool-btn capture-btn" data-tool="photo" data-tooltip="Take Photo" id="btn-photo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </button>
          <button class="tool-btn record-btn" data-tool="record" data-tooltip="Record Video" id="btn-record">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <circle cx="12" cy="12" r="4" fill="currentColor"/>
            </svg>
          </button>
        </div>

        <div class="tool-separator"></div>

        <!-- Settings & Theme -->
        <div class="tool-group">
          <button class="tool-btn" data-tool="mirror" data-tooltip="Mirror Camera" id="btn-mirror">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 3v18M18 6l3 3-3 3M6 6l-3 3 3 3"/>
            </svg>
          </button>
          <button class="tool-btn" data-tool="sound" data-tooltip="Sound" id="btn-sound">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
          </button>
          <button class="tool-btn" data-tool="theme" data-tooltip="Switch Theme" id="btn-theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- ─── Subpanels ─── -->

    <!-- Shapes Submenu -->
    <div id="panel-shapes" class="sub-panel hidden">
      <h3 class="sub-panel-title">Shapes</h3>
      <div class="sub-panel-grid">
        <button class="shape-btn active" data-shape="rectangle">
          <svg viewBox="0 0 40 40"><rect x="5" y="8" width="30" height="24" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span>Rect</span>
        </button>
        <button class="shape-btn" data-shape="circle">
          <svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="14" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span>Circle</span>
        </button>
        <button class="shape-btn" data-shape="arrow">
          <svg viewBox="0 0 40 40"><line x1="5" y1="35" x2="35" y2="5" stroke="currentColor" stroke-width="2"/><polyline points="20,5 35,5 35,20" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span>Arrow</span>
        </button>
        <button class="shape-btn" data-shape="line">
          <svg viewBox="0 0 40 40"><line x1="5" y1="35" x2="35" y2="5" stroke="currentColor" stroke-width="2"/></svg>
          <span>Line</span>
        </button>
        <button class="shape-btn" data-shape="star">
          <svg viewBox="0 0 40 40"><polygon points="20,4 24,16 37,16 27,23 31,35 20,28 9,35 13,23 3,16 16,16" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span>Star</span>
        </button>
      </div>
    </div>

    <!-- Color Picker Panel -->
    <div id="panel-color" class="sub-panel hidden">
      <h3 class="sub-panel-title">Color</h3>
      <div class="color-palette" id="color-palette">
        <button class="color-swatch active" data-color="#00f5d4" style="background:#00f5d4;"></button>
        <button class="color-swatch" data-color="#f72585" style="background:#f72585;"></button>
        <button class="color-swatch" data-color="#7b2ff7" style="background:#7b2ff7;"></button>
        <button class="color-swatch" data-color="#fee440" style="background:#fee440;"></button>
        <button class="color-swatch" data-color="#ffffff" style="background:#ffffff;"></button>
        <button class="color-swatch" data-color="#ff6b6b" style="background:#ff6b6b;"></button>
        <button class="color-swatch" data-color="#4ecdc4" style="background:#4ecdc4;"></button>
        <button class="color-swatch" data-color="#a8e6cf" style="background:#a8e6cf;"></button>
        <button class="color-swatch" data-color="#ff9a9e" style="background:#ff9a9e;"></button>
        <button class="color-swatch" data-color="#ffd93d" style="background:#ffd93d;"></button>
        <button class="color-swatch" data-color="#6c5ce7" style="background:#6c5ce7;"></button>
        <button class="color-swatch" data-color="#fd79a8" style="background:#fd79a8;"></button>
        <button class="color-swatch" data-color="#00cec9" style="background:#00cec9;"></button>
        <button class="color-swatch" data-color="#e17055" style="background:#e17055;"></button>
        <button class="color-swatch" data-color="#0984e3" style="background:#0984e3;"></button>
        <button class="color-swatch" data-color="#2d3436" style="background:#2d3436;"></button>
      </div>
    </div>

    <!-- Size Picker Panel -->
    <div id="panel-size" class="sub-panel hidden">
      <h3 class="sub-panel-title">Brush Size</h3>
      <div class="size-options">
        <button class="size-btn" data-size="3"><div class="size-circle" style="width:8px;height:8px;"></div><span>S</span></button>
        <button class="size-btn active" data-size="6"><div class="size-circle" style="width:14px;height:14px;"></div><span>M</span></button>
        <button class="size-btn" data-size="12"><div class="size-circle" style="width:22px;height:22px;"></div><span>L</span></button>
        <button class="size-btn" data-size="20"><div class="size-circle" style="width:32px;height:32px;"></div><span>XL</span></button>
      </div>
    </div>

    <!-- Camera Filter Panel -->
    <div id="panel-cam-filter" class="sub-panel hidden">
      <h3 class="sub-panel-title">Camera Filters</h3>
      <div class="filter-grid">
        <button class="filter-btn active" data-filter="none"><span>None</span></button>
        <button class="filter-btn" data-filter="grayscale"><span>B&W</span></button>
        <button class="filter-btn" data-filter="sepia"><span>Sepia</span></button>
        <button class="filter-btn" data-filter="invert"><span>Invert</span></button>
        <button class="filter-btn" data-filter="blur"><span>Blur</span></button>
        <button class="filter-btn" data-filter="neon"><span>Neon</span></button>
        <button class="filter-btn" data-filter="vintage"><span>Vintage</span></button>
        <button class="filter-btn" data-filter="comic"><span>Comic</span></button>
        <button class="filter-btn" data-filter="thermal"><span>Thermal</span></button>
        <button class="filter-btn" data-filter="pixelate"><span>Pixel</span></button>
      </div>
    </div>

    <!-- Face Filter Panel -->
    <div id="panel-face-filter" class="sub-panel hidden">
      <h3 class="sub-panel-title">Face Filters</h3>
      <div class="filter-grid">
        <button class="filter-btn active" data-face="none"><span>None</span></button>
        <button class="filter-btn" data-face="glasses"><span>🕶️ Glasses</span></button>
        <button class="filter-btn" data-face="crown"><span>👑 Crown</span></button>
        <button class="filter-btn" data-face="cat"><span>🐱 Cat</span></button>
        <button class="filter-btn" data-face="devil"><span>😈 Devil</span></button>
        <button class="filter-btn" data-face="mustache"><span>🥸 Stache</span></button>
        <button class="filter-btn" data-face="clown"><span>🤡 Clown</span></button>
      </div>
    </div>

    <!-- Sticker Panel -->
    <div id="panel-stickers" class="sub-panel hidden">
      <h3 class="sub-panel-title">Stickers</h3>
      <div class="sticker-grid" id="sticker-grid">
        <button class="sticker-btn" data-sticker="heart">❤️</button>
        <button class="sticker-btn" data-sticker="star">⭐</button>
        <button class="sticker-btn" data-sticker="fire">🔥</button>
        <button class="sticker-btn" data-sticker="sparkles">✨</button>
        <button class="sticker-btn" data-sticker="rainbow">🌈</button>
        <button class="sticker-btn" data-sticker="crown">👑</button>
        <button class="sticker-btn" data-sticker="sunglasses">😎</button>
        <button class="sticker-btn" data-sticker="party">🎉</button>
        <button class="sticker-btn" data-sticker="rocket">🚀</button>
        <button class="sticker-btn" data-sticker="lightning">⚡</button>
        <button class="sticker-btn" data-sticker="diamond">💎</button>
        <button class="sticker-btn" data-sticker="rose">🌹</button>
        <button class="sticker-btn" data-sticker="skull">💀</button>
        <button class="sticker-btn" data-sticker="alien">👽</button>
        <button class="sticker-btn" data-sticker="ghost">👻</button>
        <button class="sticker-btn" data-sticker="butterfly">🦋</button>
        <button class="sticker-btn" data-sticker="peace">✌️</button>
        <button class="sticker-btn" data-sticker="100">💯</button>
      </div>
    </div>

    <!-- ─── Text Input Modal ─── -->
    <div id="text-modal" class="modal hidden">
      <div class="modal-content">
        <h3>Add Text</h3>
        <input type="text" id="text-input" class="text-input" placeholder="Type your text..." maxlength="100" autofocus>
        <div class="modal-actions">
          <button class="modal-btn cancel" id="text-cancel">Cancel</button>
          <button class="modal-btn confirm" id="text-confirm">Add</button>
        </div>
      </div>
    </div>

    <!-- ─── Notification Toast ─── -->
    <div id="toast" class="toast hidden">
      <span id="toast-message"></span>
    </div>

    <!-- ─── Recording Indicator ─── -->
    <div id="recording-indicator" class="recording-indicator hidden">
      <div class="rec-dot"></div>
      <span>REC</span>
      <span id="rec-timer">00:00</span>
    </div>

    <!-- ─── Gesture Hint ─── -->
    <div id="gesture-hint" class="gesture-hint">
      <p>☝️ Index finger = Draw &nbsp;|&nbsp; 🤏 Pinch = Move &nbsp;|&nbsp; ✋ Palm = Erase</p>
    </div>
  </div>

  <!-- ═══ Scripts ═══ -->
  <script type="importmap">
  {
    "imports": {
      "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs"
    }
  }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
